<header class="navbar">
  <div class="brand">
    <div class="logo">CF</div>

    <div>
      <h1>CoreFlow</h1>
      <p>Gestión Comercial Segura</p>
    </div>
  </div>

  <nav class="menu">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Inicio
    </a>

    <a routerLink="/productos" routerLinkActive="active">
      Productos
    </a>

    <a routerLink="/pedidos" routerLinkActive="active">
      Pedidos
    </a>

    <a *ngIf="!auth.estaAutenticado()" routerLink="/login" routerLinkActive="active">
      Login
    </a>

    <a *ngIf="!auth.estaAutenticado()" routerLink="/registro" routerLinkActive="active">
      Registro
    </a>

    <span *ngIf="auth.estaAutenticado()" class="user-badge">
      {{ auth.obtenerUsuario() }} - {{ auth.obtenerRol() }}
    </span>

    <button *ngIf="auth.estaAutenticado()" class="logout-btn" type="button" (click)="cerrarSesion()">
      Cerrar sesión
    </button>
  </nav>
</header>

<main class="container">
  <router-outlet></router-outlet>
</main>
